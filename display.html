<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BSAFE Bingo</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
:root{
  --ace-red:#ED1C24;
  --black:#000;
  --white:#fff;
  --border:#2a2a2a;
  --gap:8px;
  --outer-pad:10px;
  --panel-pad:12px;
  --cell-size:36px;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  padding:var(--outer-pad);
  background:#000;
  color:#fff;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  overflow:hidden;
}

.layout{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:var(--gap);
  height:100%;
  max-height:586px;
}

.panel{
  background:#171717;
  border:1px solid var(--border);
  border-radius:14px;
  padding:var(--panel-pad);
  min-height:0;
}

/* ===== BOARD ===== */
#boardWrap{display:flex;height:100%}
#board{display:grid;gap:var(--gap);margin:auto}

.col-head,.cell{
  width:var(--cell-size);
  height:var(--cell-size);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  border:1px solid var(--border);
  font-weight:800;
}

.col-head{
  background:#222;
  font-size:calc(var(--cell-size)*0.45);
}

.cell{
  background:#101010;
  color:#d6d7d9;
  font-size:calc(var(--cell-size)*0.4);
}

.cell.called{
  background:var(--ace-red);
  color:#fff;
}

/* ===== PRIZE ===== */
.prize{
  display:grid;
  grid-template-rows:auto auto minmax(0,1fr);
  gap:10px;
  height:100%;
}

.prize-title{font-size:24px;font-weight:900}
.prize-desc{font-size:14px;color:#cfd2d6}

.prize-media{min-height:0;overflow:hidden}
.prize-media img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:12px;
  border:1px solid var(--border);
}

/* ===== ERROR OVERLAY ===== */
#fatalError{
  display:none;
  position:fixed;
  inset:0;
  background:#000;
  color:#ED1C24;
  padding:20px;
  font:16px system-ui;
  z-index:99999;
  white-space:pre-wrap;
}
</style>
</head>

<body>

  <div id="gameOverOverlay"
     style="display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.9);
            color:#fff;
            z-index:10000;
            align-items:center;
            justify-content:center;
            text-align:center;
            font-family:system-ui">
  <div>
    <h1 style="color:#ED1C24;font-size:48px;">GAME OVER</h1>
    <p style="font-size:22px;">Thank you for playing!</p>
  </div>
</div>
  
<div id="fatalError"></div>

<div class="layout">
  <div class="panel" id="leftPanel">
    <div id="boardWrap">
      <div id="board"></div>
    </div>
  </div>

  <div class="panel prize">
    <div class="prize-title" id="prizeTitle">Grand Prize</div>
    <div class="prize-desc" id="prizeDesc"></div>
    <div class="prize-media">
      <img id="prizeImage" alt="Prize">
    </div>
  </div>
</div>

<script>
/* =====================================================
   SHARED JSON STATE (VISIX-SAFE, COMBINED)
===================================================== */

const STATE_URL = '/state.json';

/* ===== ELEMENTS ===== */
const boardEl = document.getElementById('board');
const leftPanel = document.getElementById('leftPanel');
const errorBox = document.getElementById('fatalError');

/* ===== BUILD BOARD ===== */
function buildBoard(){
  boardEl.innerHTML='';
  ['B','S','A','F','E'].forEach(l=>{
    const h=document.createElement('div');
    h.className='col-head';
    h.textContent=l;
    boardEl.appendChild(h);
  });

  for(let r=0;r<15;r++){
    for(let c=0;c<5;c++){
      const n=c*15+(r+1);
      const d=document.createElement('div');
      d.className='cell';
      d.dataset.number=n;
      d.textContent=n;
      boardEl.appendChild(d);
    }
  }
}

/* ===== SIZING ===== */
function computeCellSize(){
  const gap=8, pad=24;
  const w=leftPanel.clientWidth-pad;
  const h=leftPanel.clientHeight-pad;
  const size=Math.floor(
    Math.max(22,Math.min(
      (w-gap*4)/5,
      (h-gap*15)/16,
      (586-32-gap*15)/16
    ))
  );
  document.documentElement.style.setProperty('--cell-size',size+'px');
  boardEl.style.gridTemplateColumns=`repeat(5,${size}px)`;
  boardEl.style.gridAutoRows=`${size}px`;
}

/* ===== APPLY STATE ===== */
function applyState(state){
  errorBox.style.display='none';

  const called=new Set(state.drawnNumbers||[]);
  document.querySelectorAll('.cell').forEach(c=>{
    c.classList.toggle('called',called.has(Number(c.dataset.number)));
  });

  const p=state.prize||{};
  document.getElementById('prizeTitle').textContent=p.title||'Grand Prize';
  document.getElementById('prizeDesc').textContent=p.description||'';

  const img=document.getElementById('prizeImage');
  if(p.image){
    img.src=p.image;
    img.style.display='block';
  }else{
    img.style.display='none';
  }
  
const overlay = document.getElementById('gameOverOverlay');

if (state.gameOver) {
  overlay.style.display = 'flex';
} else {
  overlay.style.display = 'none';
}

}

/* ===== FETCH STATE (BULLETPROOF) ===== */
async function fetchState(){
  try{
    const res=await fetch(STATE_URL+'?t='+Date.now(),{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text=await res.text();
    const state=JSON.parse(text);
    applyState(state);
  }catch(e){
    errorBox.style.display='block';
    errorBox.textContent=
      'DISPLAY ERROR\n\n'+e.message+
      '\n\nCheck:\n'+
      '- /state.json exists\n'+
      '- JSON is valid\n'+
      '- Image URL has no spaces';
  }
}

/* ===== INIT ===== */
buildBoard();
setTimeout(()=>{computeCellSize();fetchState()},300);
setTimeout(computeCellSize,1500);
window.addEventListener('resize',computeCellSize);

setInterval(fetchState,1000);

/* Silent Visix resize catch */
let lastSize='';
setInterval(()=>{
  const s=innerWidth+'x'+innerHeight;
  if(s!==lastSize){lastSize=s;computeCellSize();}
},500);
</script>

</body>
</html>
