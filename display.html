<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BSAFE Bingo</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
:root{
  --ace-red:#ED1C24;
  --black:#000;
  --white:#fff;
  --border:#2a2a2a;

  --gap:8px;
  --outer-pad:10px;
  --panel-pad:12px;
  --cell-size:36px;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  padding:var(--outer-pad);
  background:#000;
  color:#fff;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  overflow:hidden;
}

/* ===== LAYOUT (VISIX REGION) ===== */
.layout{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:var(--gap);
  height:100%;
  max-height:586px;
}

/* ===== PANEL ===== */
.panel{
  background:#171717;
  border:1px solid var(--border);
  border-radius:14px;
  padding:var(--panel-pad);
  min-height:0;
}

/* ===== BOARD ===== */
#boardWrap{
  display:flex;
  height:100%;
}

#board{
  display:grid;
  gap:var(--gap);
  margin:auto;
}

.col-head,
.cell{
  width:var(--cell-size);
  height:var(--cell-size);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  border:1px solid var(--border);
  font-weight:800;
}

.col-head{
  background:#222;
  font-size:calc(var(--cell-size) * 0.45);
}

.cell{
  background:#101010;
  color:#d6d7d9;
  font-size:calc(var(--cell-size) * 0.4);
}

.cell.called{
  background:var(--ace-red);
  color:#fff;
}

/* ===== PRIZE ===== */
.prize{
  display:grid;
  grid-template-rows:auto auto minmax(0,1fr);
  gap:10px;
  height:100%;
}

.prize-title{
  font-size:24px;
  font-weight:900;
}

.prize-desc{
  font-size:14px;
  color:#cfd2d6;
}

.prize-media{
  min-height:0;
  overflow:hidden;
}

.prize-media img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:12px;
  border:1px solid var(--border);
}
</style>
</head>

<body>
<div class="layout">

  <!-- LEFT: BINGO BOARD -->
  <div class="panel" id="leftPanel">
    <div id="boardWrap">
      <div id="board"></div>
    </div>
  </div>

  <!-- RIGHT: PRIZE -->
  <div class="panel prize">
    <div class="prize-title" id="prizeTitle">Grand Prize</div>
    <div class="prize-desc" id="prizeDesc">Top prize for the month-long game.</div>
    <div class="prize-media">
      <img id="prizeImage" alt="Prize">
    </div>
  </div>

</div>

<script>
/* ===== STATE ===== */
const STORAGE_KEY='bingoState_v1';

function defaultState(){
  return {
    letters:['B','S','A','F','E'],
    drawnNumbers:[],
    prize:{ title:'Grand Prize', description:'Top prize for the month-long game.', image:'' }
  };
}

function getState(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState();
  }catch{
    return defaultState();
  }
}

/* ===== BUILD BOARD ===== */
const boardEl=document.getElementById('board');
const leftPanel=document.getElementById('leftPanel');

function buildBoard(){
  boardEl.innerHTML='';
  const letters=['B','S','A','F','E'];

  letters.forEach(l=>{
    const h=document.createElement('div');
    h.className='col-head';
    h.textContent=l;
    boardEl.appendChild(h);
  });

  for(let r=0;r<15;r++){
    for(let c=0;c<5;c++){
      const n=c*15+(r+1);
      const d=document.createElement('div');
      d.className='cell';
      d.dataset.number=n;
      d.textContent=n;
      boardEl.appendChild(d);
    }
  }
}

/* ===== VISIX-SAFE SIZING ===== */
function computeCellSize(){
  const gap=8;
  const pad=24;

  const availW=leftPanel.clientWidth-pad;
  const availH=leftPanel.clientHeight-pad;

  const sizeByW=(availW-gap*4)/5;
  const sizeByH=(availH-gap*15)/16;

  const visixCap=Math.floor((586-32-gap*15)/16);

  const cell=Math.floor(Math.max(22,Math.min(sizeByW,sizeByH,visixCap)));

  document.documentElement.style.setProperty('--cell-size',cell+'px');
  boardEl.style.gridTemplateColumns=`repeat(5,${cell}px)`;
  boardEl.style.gridAutoRows=`${cell}px`;
}

/* ===== UPDATE ===== */
function updateBoard(){
  const s=getState();
  const called=new Set(s.drawnNumbers||[]);

  document.querySelectorAll('.cell').forEach(c=>{
    c.classList.toggle('called',called.has(Number(c.dataset.number)));
  });

  const prize=s.prize||{};
  document.getElementById('prizeTitle').textContent=prize.title||'Grand Prize';
  document.getElementById('prizeDesc').textContent=prize.description||'';

  const img=document.getElementById('prizeImage');
  if(prize.image){
    img.src=prize.image;
    img.style.display='block';
  }else{
    img.style.display='none';
  }
}

/* ===== INIT ===== */
buildBoard();

setTimeout(()=>{
  computeCellSize();
  updateBoard();
},300);

setTimeout(computeCellSize,1500);

window.addEventListener('resize',computeCellSize);

/* Silent Visix resize catch */
let lastSize=`${innerWidth}x${innerHeight}`;
setInterval(()=>{
  const now=`${innerWidth}x${innerHeight}`;
  if(now!==lastSize){
    lastSize=now;
    computeCellSize();
  }
},500);

/* State sync */
window.addEventListener('storage',e=>{
  if(e.key===STORAGE_KEY) updateBoard();
});
</script>
</body>
</html>
