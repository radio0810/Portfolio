<script>
/* =====================================================
   SHARED JSON STATE (VISIX-SAFE)
===================================================== */

const STATE_URL = '/state.json';
let lastStateText = '';

/* ===== BUILD BOARD ===== */
const boardEl = document.getElementById('board');
const leftPanel = document.getElementById('leftPanel');

function buildBoard(){
  boardEl.innerHTML='';
  const letters=['B','S','A','F','E'];

  letters.forEach(l=>{
    const h=document.createElement('div');
    h.className='col-head';
    h.textContent=l;
    boardEl.appendChild(h);
  });

  for(let r=0;r<15;r++){
    for(let c=0;c<5;c++){
      const n=c*15+(r+1);
      const d=document.createElement('div');
      d.className='cell';
      d.dataset.number=n;
      d.textContent=n;
      boardEl.appendChild(d);
    }
  }
}

/* ===== VISIX-SAFE SIZING ===== */
function computeCellSize(){
  const gap=8;
  const pad=24;

  const availW=leftPanel.clientWidth-pad;
  const availH=leftPanel.clientHeight-pad;

  const sizeByW=(availW-gap*4)/5;
  const sizeByH=(availH-gap*15)/16;

  const visixCap=Math.floor((586-32-gap*15)/16);

  const cell=Math.floor(Math.max(22,Math.min(sizeByW,sizeByH,visixCap)));

  document.documentElement.style.setProperty('--cell-size',cell+'px');
  boardEl.style.gridTemplateColumns=`repeat(5,${cell}px)`;
  boardEl.style.gridAutoRows=`${cell}px`;
}

/* ===== APPLY STATE FROM JSON ===== */
function applyState(state){
  const called = new Set(state.drawnNumbers || []);

  document.querySelectorAll('.cell').forEach(cell=>{
    const n = Number(cell.dataset.number);
    cell.classList.toggle('called', called.has(n));
  });

  const prize = state.prize || {};

  document.getElementById('prizeTitle').textContent =
    prize.title || 'Grand Prize';

  document.getElementById('prizeDesc').textContent =
    prize.description || '';

  const img = document.getElementById('prizeImage');
  if (prize.image) {
    img.src = prize.image;
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
  }
}

/* ===== FETCH SHARED STATE ===== */
async function fetchState(){
  try{
    const res = await fetch(
      STATE_URL + '?t=' + Date.now(),
      { cache:'no-store' }
    );

    if(!res.ok) return;

    const text = await res.text();

    // Skip if unchanged
    if(text === lastStateText) return;

    lastStateText = text;
    const state = JSON.parse(text);
    applyState(state);

  }catch(err){
    console.warn('State fetch failed', err);
  }
}

/* ===== INIT ===== */
buildBoard();

setTimeout(()=>{
  computeCellSize();
  fetchState();
},300);

setTimeout(computeCellSize,1500);

window.addEventListener('resize', computeCellSize);

/* Silent Visix resize catch */
let lastSize = `${innerWidth}x${innerHeight}`;
setInterval(()=>{
  const now = `${innerWidth}x${innerHeight}`;
  if(now !== lastSize){
    lastSize = now;
    computeCellSize();
  }
},500);

/* Poll JSON every second (signage standard) */
setInterval(fetchState, 1000);
</script>
