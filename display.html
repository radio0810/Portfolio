<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BSAFE Bingo</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
:root{
  --ace-red:#ED1C24;
  --black:#000;
  --white:#fff;
  --border:#2a2a2a;

  --gap:8px;
  --outer-pad:10px;
  --panel-pad:12px;
  --cell-size:40px;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  padding:var(--outer-pad);
  background:#000;
  color:#fff;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  overflow:hidden;
}

.layout{
  display:grid;
  grid-template-columns:.6fr 1.35fr;
  gap:var(--gap);
  height:100%;
  overflow:hidden;
}

.panel{
  background:#171717;
  border:1px solid var(--border);
  border-radius:14px;
  padding:var(--panel-pad);
  min-height:0;
}

/* ===== BOARD ===== */
#boardWrap{
  display:flex;
  height:100%;
}

#board{
  display:grid;
  gap:var(--gap);
  margin:auto;
}

.col-head,
.cell{
  width:var(--cell-size);
  height:var(--cell-size);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  border:1px solid var(--border);
  font-weight:800;
}

.col-head{
  background:#222;
}

.cell{
  background:#101010;
  color:#d6d7d9;
}

.cell.called{
  background:var(--ace-red);
  color:#fff;
}

/* ===== RIGHT SIDE ===== */
.right-side{
  display:grid;
  grid-template-rows:auto minmax(0,1fr);
  gap:var(--gap);
  height:100%;
}

.last-draw{
  display:grid;
  grid-template-columns:120px 1fr;
  gap:16px;
}

.ball{
  width:96px;
  height:96px;
  border-radius:50%;
  border:6px solid var(--ace-red);
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#111;
  font-size:32px;
  font-weight:900;
}

.prize{
  display:grid;
  grid-template-rows:auto minmax(0,1fr);
  gap:10px;
}

.prize-media{
  min-height:0;
  overflow:hidden;
}

.prize-media img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:12px;
}

/* ===== COMPACT VISIX MODE ===== */
@media (max-height:600px){
  .layout{
    max-height:586px;
  }
  .prize{
    display:none;
  }
}

/* ===== STACK IF PORTRAIT ===== */
@media (max-aspect-ratio:1/1){
  .layout{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div class="layout">

  <!-- LEFT -->
  <div class="panel" id="leftPanel">
    <div id="boardWrap">
      <div id="board"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-side">
    <div class="panel last-draw">
      <div class="ball" id="ballNumber">–</div>
      <div>
        <div id="lastText">Waiting…</div>
        <div id="calledCount">0 / 75</div>
      </div>
    </div>

    <div class="panel prize">
      <div id="prizeTitle">Grand Prize</div>
      <div class="prize-media">
        <img id="prizeImage" />
      </div>
    </div>
  </div>

</div>

<script>
/* ===== STATE ===== */
const STORAGE_KEY='bingoState_v1';

function getState(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {letters:['B','S','A','F','E'],drawnNumbers:[]};
  }catch{ return {letters:['B','S','A','F','E'],drawnNumbers:[]}; }
}

function letterForNumber(n){
  return ['B','S','A','F','E'][Math.floor((n-1)/15)];
}

/* ===== BUILD BOARD ===== */
const boardEl=document.getElementById('board');
const leftPanel=document.getElementById('leftPanel');

function buildBoard(){
  boardEl.innerHTML='';
  const letters=['B','S','A','F','E'];
  letters.forEach(l=>{
    const h=document.createElement('div');
    h.className='col-head';
    h.textContent=l;
    boardEl.appendChild(h);
  });
  for(let r=0;r<15;r++){
    for(let c=0;c<5;c++){
      const n=c*15+(r+1);
      const d=document.createElement('div');
      d.className='cell';
      d.dataset.number=n;
      d.textContent=n;
      boardEl.appendChild(d);
    }
  }
}

/* ===== VISIX-SAFE SIZING ===== */
function computeCellSize(){
  const gap=8;
  const panelPad=24;
  const availW=leftPanel.clientWidth-panelPad;
  const availH=leftPanel.clientHeight-panelPad;

  const sizeByW=(availW-gap*4)/5;
  const sizeByH=(availH-gap*15)/16;

  const visixCap=Math.floor((586-32-gap*15)/16);

  const cell=Math.floor(Math.max(22,Math.min(sizeByW,sizeByH,visixCap)));

  document.documentElement.style.setProperty('--cell-size',cell+'px');
  boardEl.style.gridTemplateColumns=`repeat(5,${cell}px)`;
  boardEl.style.gridAutoRows=`${cell}px`;
}

/* ===== UPDATE ===== */
function updateBoard(){
  const s=getState();
  const called=new Set(s.drawnNumbers||[]);
  document.querySelectorAll('.cell').forEach(c=>{
    c.classList.toggle('called',called.has(Number(c.dataset.number)));
  });
  if(s.drawnNumbers?.length){
    const last=s.drawnNumbers[s.drawnNumbers.length-1];
    document.getElementById('ballNumber').textContent=last;
    document.getElementById('lastText').textContent=letterForNumber(last)+' '+last;
    document.getElementById('calledCount').textContent=`${s.drawnNumbers.length} / 75`;
  }
}

/* ===== INIT ===== */
buildBoard();

setTimeout(()=>{
  computeCellSize();
  updateBoard();
},300);

setTimeout(computeCellSize,1500);

window.addEventListener('resize',computeCellSize);

/* Silent resize catch (Visix) */
let lastSize=`${innerWidth}x${innerHeight}`;
setInterval(()=>{
  const now=`${innerWidth}x${innerHeight}`;
  if(now!==lastSize){
    lastSize=now;
    computeCellSize();
  }
},500);

/* State sync */
window.addEventListener('storage',e=>{
  if(e.key===STORAGE_KEY) updateBoard();
});
</script>
</body>
</html>
