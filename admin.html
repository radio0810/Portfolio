<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BSAFE Bingo – Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  padding:20px;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  background:#0f0f0f;
  color:#fff;
}
h1{margin-top:0}
section{
  background:#171717;
  border:1px solid #2a2a2a;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}
label{display:block;margin-top:10px}
input{
  width:100%;
  padding:8px;
  margin-top:4px;
}
button{
  margin-top:12px;
  padding:10px 14px;
  background:#ED1C24;
  border:none;
  color:#fff;
  font-weight:700;
  border-radius:6px;
  cursor:pointer;
}
.drawn span{
  display:inline-block;
  background:#222;
  padding:6px 10px;
  border-radius:999px;
  margin:4px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>BSAFE Bingo – Admin</h1>

<section>
  <h2>Draw Numbers</h2>
  <label>Number (1–75)</label>
  <input id="num" type="number" min="1" max="75">
  <button onclick="addNumber()">Add Number</button>
  <div class="drawn" id="drawn"></div>
  <small>Click a number to remove it</small>
</section>

<section>
  <h2>Prize</h2>
  <label>Title</label>
  <input id="title" placeholder="Grand Prize">
  <label>Description</label>
  <input id="desc" placeholder="Prize description">
  <label>Image URL</label>
  <input id="img" placeholder="https://example.com/prize.jpg">
</section>

<section>
  <button onclick="exportJSON()">Export state.json</button>
</section>

<script>
const state = {
  letters:['B','S','A','F','E'],
  drawnNumbers:[],
  prize:{ title:'Grand Prize', description:'', image:'' }
};

function addNumber(){
  const n = Number(document.getElementById('num').value);
  if(n<1||n>75||state.drawnNumbers.includes(n)) return;
  state.drawnNumbers.push(n);
  render();
}

function removeNumber(n){
  state.drawnNumbers = state.drawnNumbers.filter(x=>x!==n);
  render();
}

function render(){
  const d = document.getElementById('drawn');
  d.innerHTML='';
  state.drawnNumbers.forEach(n=>{
    const s=document.createElement('span');
    s.textContent=n;
    s.onclick=()=>removeNumber(n);
    d.appendChild(s);
  });
}

function exportJSON(){
  state.prize.title = document.getElementById('title').value || 'Grand Prize';
  state.prize.description = document.getElementById('desc').value || '';
  state.prize.image = document.getElementById('img').value || '';

  const blob = new Blob(
    [JSON.stringify(state,null,2)],
    {type:'application/json'}
  );

  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='state.json';
  a.click();
}
</script>

</body>
</html>
