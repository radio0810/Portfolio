<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BSAFE Bingo – Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  background:#0f0f0f;
  color:#fff;
  margin:0;
  padding:20px;
}
h1{margin-top:0}
section{
  background:#171717;
  border:1px solid #2a2a2a;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}
label{display:block;margin-top:8px;font-weight:600}
input,button{
  padding:8px;
  margin-top:6px;
  font-size:14px;
}
button{
  background:#ED1C24;
  border:none;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}
button.secondary{
  background:#333;
}
.drawn{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}
.drawn span{
  background:#222;
  padding:6px 10px;
  border-radius:999px;
  cursor:pointer;
}
small{color:#aaa}
</style>
</head>

<body>

<h1>BSAFE Bingo – Admin</h1>

<section>
  <h2>Draw Numbers</h2>
  <label>Number (1–75)</label>
  <input id="numInput" type="number" min="1" max="75">
