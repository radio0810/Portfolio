<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BSAFE Bingo – Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  padding:20px;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  background:#0f0f0f;
  color:#fff;
}
h1{margin-top:0}
section{
  background:#171717;
  border:1px solid #2a2a2a;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}
label{display:block;margin-top:10px}
input,button{
  padding:8px;
  margin-top:6px;
  font-size:14px;
}
button{
  background:#ED1C24;
  border:none;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
  margin-right:6px;
}
button.secondary{background:#444}
.drawn span{
  display:inline-block;
  background:#222;
  padding:6px 10px;
  border-radius:999px;
  margin:4px;
  cursor:pointer;
}
img.preview{
  max-width:100%;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #333;
}
</style>
</head>

<body>

<h1>BSAFE Bingo – Admin</h1>

<section>
  <h2>Draw Numbers</h2>

  <button onclick="drawRandom()">Draw Random</button>
  <button class="secondary" onclick="undoLast()">Undo Last</button>
  <button class="secondary" onclick="resetGame()">Reset Game</button>

  <label>Manual Number (1–75)</label>
  <input id="manualNum" type="number" min="1" max="75">
  <button onclick="addNumber()">Add Number</button>

  <div class="drawn" id="drawn"></div>
  <small>Click a number to remove it</small>
</section>

<section>
  <h2>Prize</h2>

  <label>Title</label>
  <input id="title" placeholder="Grand Prize">

  <label>Description</label>
  <input id="desc" placeholder="Prize description">

  <label>Upload Image</label>
  <input type="file" accept="image/*" onchange="loadImage(event)">
  <img id="preview" class="preview" style="display:none">
</section>

<section>
  <button onclick="exportJSON()">Export state.json</button>
</section>

<script>
const state = {
  letters:['B','S','A','F','E'],
  drawnNumbers:[],
  prize:{ title:'Grand Prize', description:'', image:'' }
};

const drawnEl=document.getElementById('drawn');

function render(){
  drawnEl.innerHTML='';
  state.drawnNumbers.forEach(n=>{
    const s=document.createElement('span');
    s.textContent=n;
    s.onclick=()=>removeNumber(n);
    drawnEl.appendChild(s);
  });
}

function addNumber(){
  const n=Number(document.getElementById('manualNum').value);
  if(n<1||n>75||state.drawnNumbers.includes(n)) return;
  state.drawnNumbers.push(n);
  render();
}

function removeNumber(n){
  state.drawnNumbers=state.drawnNumbers.filter(x=>x!==n);
  render();
}

function drawRandom(){
  const pool=[];
  for(let i=1;i<=75;i++){
    if(!state.drawnNumbers.includes(i)) pool.push(i);
  }
  if(!pool.length) return;
  const n=pool[Math.floor(Math.random()*pool.length)];
  state.drawnNumbers.push(n);
  render();
}

function undoLast(){
  state.drawnNumbers.pop();
  render();
}

function resetGame(){
  if(confirm('Reset all drawn numbers?')){
    state.drawnNumbers=[];
    render();
  }
}

/* ===== IMAGE UPLOAD (BASE64) ===== */
function loadImage(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=()=>{
    state.prize.image=reader.result;
    const img=document.getElementById('preview');
    img.src=reader.result;
    img.style.display='block';
  };
  reader.readAsDataURL(file);
}

/* ===== EXPORT ===== */
function exportJSON(){
  state.prize.title=document.getElementById('title').value||'Grand Prize';
  state.prize.description=document.getElementById('desc').value||'';

  const blob=new Blob(
    [JSON.stringify(state,null,2)],
    {type:'application/json'}
  );
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='state.json';
  a.click();
}
</script>

</body>
</html>
